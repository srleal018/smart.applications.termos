<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link id="favicon" rel="icon" type="image/jpeg" href="https://media-gru1-1.cdn.whatsapp.net/v/t61.24694-24/489405406_650586094569182_6793834854762065392_n.jpg?ccb=11-4&oh=01_Q5Aa4wGY7p0SayjbDIPzs9zg4cRQqjwpuZWHtXDXiacRVfJnLw&oe=6A35BF57&_nc_sid=5e03e0&_nc_cat=102">
  
  <title>PDV Profissional</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>

  <!-- HTML2PDF para baixar relatórios -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React e Lucide Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.330.0?deps=react@18.2.0"
      }
    }
  </script>
</head>
<body class="transition-colors duration-300 bg-gray-100 dark:bg-gray-950 text-gray-800 dark:text-gray-100">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ShoppingCart, Settings, Tag, PlusCircle, MinusCircle, CheckCircle, 
      CreditCard, Banknote, X, Edit2, Trash2, RotateCcw, LayoutDashboard, 
      History, Printer, Download, Calculator, Lock, Sun, Moon, AlertTriangle, 
      Info, Image, FileArchive, Flag, GripHorizontal
    } from 'lucide-react';

    function App() {
      // --- GERENCIAMENTO DE ESTADO E LOCALSTORAGE ---
      const loadData = (key, defaultValue) => {
        const saved = localStorage.getItem(key);
        return saved ? JSON.parse(saved) : defaultValue;
      };

      const defaultSettings = { 
        gremioName: 'Grêmio Estudantil', 
        eventName: 'Festa Junina',
        logoUrl: 'https://media-gru1-1.cdn.whatsapp.net/v/t61.24694-24/489405406_650586094569182_6793834854762065392_n.jpg?ccb=11-4&oh=01_Q5Aa4wGY7p0SayjbDIPzs9zg4cRQqjwpuZWHtXDXiacRVfJnLw&oe=6A35BF57&_nc_sid=5e03e0&_nc_cat=102'
      };

      const [theme, setTheme] = useState(() => loadData('pdv_theme', 'light'));
      const [settings, setSettings] = useState(() => loadData('pdv_settings', defaultSettings));
      const [products, setProducts] = useState(() => loadData('pdv_products', []));
      const [sales, setSales] = useState(() => loadData('pdv_sales', []));
      const [eventLogs, setEventLogs] = useState(() => loadData('pdv_event_logs', []));
      
      const [activeTab, setActiveTab] = useState('pos'); 
      const [cart, setCart] = useState([]);
      const [cartDiscount, setCartDiscount] = useState(0);

      const [cashDrawer, setCashDrawer] = useState(() => loadData('pdv_cash_drawer', {
        200: 0, 100: 0, 50: 0, 20: 0, 10: 0, 5: 0, 2: 0, 1: 0, 0.5: 0, 0.25: 0, 0.1: 0, 0.05: 0
      }));

      // Modais Customizados
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, title: '', text: '', action: null, isDanger: false });
      const [alertDialog, setAlertDialog] = useState({ isOpen: false, title: '', text: '' });
      const [isPixModalOpen, setIsPixModalOpen] = useState(false);

      const [editingProduct, setEditingProduct] = useState(null);
      const [prodName, setProdName] = useState('');
      const [prodPrice, setProdPrice] = useState('');
      const [checkoutMsg, setCheckoutMsg] = useState('');
      const [pixStudentName, setPixStudentName] = useState('');
      const [pixStudentClass, setPixStudentClass] = useState('');

      // --- ESTADOS DA CALCULADORA MÓVEL ---
      const [isCalcOpen, setIsCalcOpen] = useState(false);
      const [calcInput, setCalcInput] = useState('');
      const [calcPos, setCalcPos] = useState({ x: window.innerWidth - 300, y: 80 });
      const [isDragging, setIsDragging] = useState(false);
      const dragRef = useRef({ x: 0, y: 0 });

      // Persistência
      useEffect(() => { localStorage.setItem('pdv_theme', JSON.stringify(theme)); }, [theme]);
      useEffect(() => { 
        localStorage.setItem('pdv_settings', JSON.stringify(settings)); 
        document.getElementById('favicon').href = settings.logoUrl;
      }, [settings]);
      useEffect(() => { localStorage.setItem('pdv_products', JSON.stringify(products)); }, [products]);
      useEffect(() => { localStorage.setItem('pdv_sales', JSON.stringify(sales)); }, [sales]);
      useEffect(() => { localStorage.setItem('pdv_event_logs', JSON.stringify(eventLogs)); }, [eventLogs]);
      useEffect(() => { localStorage.setItem('pdv_cash_drawer', JSON.stringify(cashDrawer)); }, [cashDrawer]);

      // Aplicação do Tema Dark/Light
      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      // Eventos globais para arrastar a calculadora
      useEffect(() => {
        const handleMouseMove = (e) => {
          if (!isDragging) return;
          setCalcPos({
            x: e.clientX - dragRef.current.x,
            y: e.clientY - dragRef.current.y
          });
        };
        const handleMouseUp = () => setIsDragging(false);

        if (isDragging) {
          window.addEventListener('mousemove', handleMouseMove);
          window.addEventListener('mouseup', handleMouseUp);
        }
        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseup', handleMouseUp);
        };
      }, [isDragging]);

      // Utilitários
      const formatCurrency = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      const formatDate = (isoString) => new Date(isoString).toLocaleString('pt-BR');

      // --- EXPORTAÇÃO E CÁLCULOS GERAIS ---
      const getReport = () => {
        return sales.reduce((acc, sale) => {
          acc.total += sale.total;
          acc.discounts += sale.discount || 0;
          if (sale.paymentMethod === 'PIX') acc.pix += sale.total;
          if (sale.paymentMethod === 'DINHEIRO') acc.dinheiro += sale.total;

          sale.items.forEach(item => {
            if (!acc.items[item.product.id]) acc.items[item.product.id] = { name: item.product.name, quantity: 0, total: 0 };
            acc.items[item.product.id].quantity += item.quantity;
            acc.items[item.product.id].total += (item.quantity * item.product.price);
          });
          return acc;
        }, { total: 0, pix: 0, dinheiro: 0, discounts: 0, items: {} });
      };

      const calculateDrawerTotal = () => {
        return Object.entries(cashDrawer).reduce((total, [value, qty]) => total + (Number(value) * Number(qty || 0)), 0);
      };

      const reportData = getReport();
      const drawerTotal = calculateDrawerTotal();
      const drawerDiff = drawerTotal - reportData.dinheiro;

      // --- CAIXA E VENDAS ---
      const addToCart = (product) => {
        setCart(prev => {
          const exists = prev.find(i => i.product.id === product.id);
          if (exists) return prev.map(i => i.product.id === product.id ? { ...i, quantity: i.quantity + 1 } : i);
          return [...prev, { product, quantity: 1 }];
        });
      };

      const removeFromCart = (productId) => {
        setCart(prev => {
          const exists = prev.find(i => i.product.id === productId);
          if (exists.quantity === 1) return prev.filter(i => i.product.id !== productId);
          return prev.map(i => i.product.id === productId ? { ...i, quantity: i.quantity - 1 } : i);
        });
      };

      const cartSubtotal = cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
      const cartTotal = Math.max(0, cartSubtotal - cartDiscount);

      const processCheckout = (paymentMethod) => {
        if (cart.length === 0) return;
        if (paymentMethod === 'PIX' && (!pixStudentName.trim() || !pixStudentClass.trim())) {
          setAlertDialog({ isOpen: true, title: 'Atenção', text: 'Por favor, preencha o Nome e a Série do aluno.'});
          return;
        }

        const newSale = {
          id: Date.now().toString(),
          items: [...cart], subtotal: cartSubtotal, discount: cartDiscount, total: cartTotal,
          paymentMethod, timestamp: new Date().toISOString(),
          studentInfo: paymentMethod === 'PIX' ? { name: pixStudentName, schoolClass: pixStudentClass } : null
        };

        setSales([newSale, ...sales]); setCart([]); setCartDiscount(0);
        setPixStudentName(''); setPixStudentClass(''); setIsPixModalOpen(false);

        setCheckoutMsg(`Sucesso! ${formatCurrency(cartTotal)} via ${paymentMethod}`);
        setTimeout(() => setCheckoutMsg(''), 3000);
      };

      const cancelSale = (saleId) => {
        setConfirmDialog({
          isOpen: true, title: 'Estornar Venda', text: 'Tem certeza que deseja estornar (cancelar) esta venda? Ela será removida do histórico.', isDanger: true,
          action: () => setSales(sales.filter(s => s.id !== saleId))
        });
      };

      // --- PRODUTOS ---
      const saveProduct = (e) => {
        e.preventDefault();
        if (!prodName || !prodPrice) return;
        const priceNum = parseFloat(prodPrice.toString().replace(',', '.'));
        if (editingProduct) {
          setProducts(products.map(p => p.id === editingProduct.id ? { ...p, name: prodName, price: priceNum } : p));
          setEditingProduct(null);
        } else {
          setProducts([...products, { id: Date.now().toString(), name: prodName, price: priceNum }]);
        }
        setProdName(''); setProdPrice('');
      };

      // --- EXPORTAÇÃO PDF & IMPRESSÃO (FORÇANDO MODO CLARO) ---
      const requestPrint = () => {
        const wasDark = document.documentElement.classList.contains('dark');
        if (wasDark) document.documentElement.classList.remove('dark');
        
        setTimeout(() => {
          window.print();
          if (wasDark) document.documentElement.classList.add('dark');
        }, 100);
      };

      const downloadPDF = async (elementId, filenamePrefix) => {
        const element = document.getElementById(elementId);
        const wasDark = document.documentElement.classList.contains('dark');
        
        // Força modo claro temporariamente para o PDF
        if (wasDark) document.documentElement.classList.remove('dark');
        
        await new Promise(resolve => setTimeout(resolve, 100)); // Espera o CSS aplicar

        const opt = {
          margin: 10,
          filename: `${filenamePrefix}_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.pdf`,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
          // Restaura o modo escuro
          if (wasDark) document.documentElement.classList.add('dark');
        });
      };

      // --- LÓGICA DA CALCULADORA COM VÍRGULA ---
      const handleCalcBtn = (btn) => {
        if(btn === 'C') setCalcInput('');
        else if(btn === '=') { 
          try { 
            // Substitui símbolos visuais por operadores matemáticos reais
            let expression = calcInput.replace(/×/g, '*').replace(/÷/g, '/').replace(/,/g, '.');
            let result = eval(expression);
            // Retorna o resultado com vírgula se for decimal
            setCalcInput(String(result).replace('.', ',')); 
          } catch(e) { setCalcInput('Erro'); } 
        } 
        else { 
          setCalcInput(prev => prev === 'Erro' ? btn : prev + btn); 
        }
      };

      // --- LOGS E ENCERRAMENTO DE EVENTO ---
      const finishEvent = () => {
        if(sales.length === 0) {
          setAlertDialog({isOpen: true, title: 'Aviso', text: 'Não há vendas registradas para encerrar um evento.'});
          return;
        }

        setConfirmDialog({
          isOpen: true, 
          title: 'Encerrar e Salvar Evento', 
          text: `Deseja encerrar o evento "${settings.eventName}"? Isso salvará o faturamento nos Logs Históricos, apagará as vendas atuais e limpará a gaveta para o próximo evento.`, 
          isDanger: true,
          action: () => {
            const newLog = {
              id: Date.now().toString(),
              date: new Date().toISOString(),
              eventName: settings.eventName,
              totalGross: reportData.total,
              totalPix: reportData.pix,
              totalCash: reportData.dinheiro,
              drawerPhysical: drawerTotal,
              difference: drawerDiff
            };
            
            setEventLogs([newLog, ...eventLogs]);
            setSales([]); 
            setCashDrawer({200:0,100:0,50:0,20:0,10:0,5:0,2:0,1:0,0.5:0,0.25:0,0.1:0,0.05:0}); 
            setActiveTab('settings');
            setAlertDialog({isOpen: true, title: 'Sucesso', text: 'Evento encerrado com sucesso! Verifique a aba de Configurações para ver os logs.'});
          }
        });
      };

      const NavItem = ({ id, icon: Icon, label }) => (
        <button onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 font-medium ${activeTab === id ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'}`}>
          <Icon size={20} /> <span className="hidden md:block">{label}</span>
        </button>
      );

      // Componente reutilizável de Assinaturas
      const SignaturesSection = () => (
        <div className="mt-24 pt-8 flex flex-col md:flex-row justify-between text-center text-sm font-semibold text-gray-800 print:text-black gap-12 print:gap-8">
          <div className="flex-1">
            <div className="border-t-2 border-gray-400 print:border-black mx-2 pt-2">
              <p>Operador de Caixa</p>
            </div>
          </div>
          <div className="flex-1">
            <div className="border-t-2 border-gray-400 print:border-black mx-2 pt-2">
              <p>Coordenador Financeiro</p>
            </div>
          </div>
          <div className="flex-1">
            <div className="border-t-2 border-gray-400 print:border-black mx-2 pt-2">
              <p>Coordenador Geral</p>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen flex w-full font-sans">
          
          {/* ================= MODAIS ESCONDIDOS ================= */}
          
          {/* Alerta Simples */}
          {alertDialog.isOpen && (
            <div className="absolute inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm print:hidden">
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-sm p-6 animate-in zoom-in-95">
                <div className="flex items-center gap-3 mb-4 text-blue-600 dark:text-blue-400">
                  <Info size={28}/> <h3 className="text-xl font-bold">{alertDialog.title}</h3>
                </div>
                <p className="text-gray-700 dark:text-gray-300 mb-6">{alertDialog.text}</p>
                <button onClick={() => setAlertDialog({isOpen: false})} className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-colors">
                  Entendi
                </button>
              </div>
            </div>
          )}

          {/* Confirmação (Sim/Não) */}
          {confirmDialog.isOpen && (
            <div className="absolute inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm print:hidden">
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-sm p-6 animate-in zoom-in-95">
                <div className={`flex items-center gap-3 mb-4 ${confirmDialog.isDanger ? 'text-red-500' : 'text-blue-600 dark:text-blue-400'}`}>
                  {confirmDialog.isDanger ? <AlertTriangle size={28}/> : <Info size={28}/>} 
                  <h3 className="text-xl font-bold">{confirmDialog.title}</h3>
                </div>
                <p className="text-gray-700 dark:text-gray-300 mb-6">{confirmDialog.text}</p>
                <div className="flex gap-3">
                  <button onClick={() => setConfirmDialog({...confirmDialog, isOpen: false})} className="flex-1 py-3 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-xl font-bold hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                    Cancelar
                  </button>
                  <button onClick={() => { confirmDialog.action(); setConfirmDialog({...confirmDialog, isOpen: false}); }} className={`flex-1 py-3 text-white rounded-xl font-bold transition-colors ${confirmDialog.isDanger ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
                    Confirmar
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Calculadora Flutuante Móvel */}
          {isCalcOpen && (
            <div 
              style={{ left: calcPos.x, top: calcPos.y, position: 'fixed' }}
              className="z-[90] bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 w-64 print:hidden"
            >
              <div 
                className="flex justify-between items-center mb-3 cursor-move bg-gray-100 dark:bg-gray-900 -mx-4 -mt-4 p-3 rounded-t-2xl border-b dark:border-gray-700"
                onMouseDown={(e) => {
                  setIsDragging(true);
                  dragRef.current = { x: e.clientX - calcPos.x, y: e.clientY - calcPos.y };
                }}
              >
                <div className="flex items-center gap-2 text-gray-500 dark:text-gray-400">
                  <GripHorizontal size={16}/>
                  <span className="font-bold text-gray-700 dark:text-gray-200 text-sm select-none">Calculadora</span>
                </div>
                <button onClick={() => setIsCalcOpen(false)} className="text-gray-500 hover:text-red-500"><X size={18}/></button>
              </div>
              
              <div className="bg-gray-100 dark:bg-gray-900 p-3 rounded-xl text-right text-2xl font-mono mb-3 overflow-hidden border dark:border-gray-700 select-none">
                {calcInput || '0'}
              </div>
              <div className="grid grid-cols-4 gap-2">
                {['7','8','9','÷','4','5','6','×','1','2','3','-','C','0',',','+'].map(btn => (
                  <button key={btn} onClick={() => handleCalcBtn(btn)} className={`p-3 rounded-lg font-bold text-lg transition-colors ${btn === 'C' ? 'bg-red-500 text-white hover:bg-red-600' : ['÷','×','-','+'].includes(btn) ? 'bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600' : 'bg-gray-50 dark:bg-gray-800 border dark:border-gray-600 hover:bg-gray-200 dark:hover:bg-gray-700'}`}>{btn}</button>
                ))}
                <button onClick={() => handleCalcBtn('=')} className="col-span-4 p-3 rounded-lg font-bold text-lg bg-blue-600 text-white hover:bg-blue-700 transition-colors">=</button>
              </div>
            </div>
          )}

          {/* Modal PIX */}
          {isPixModalOpen && (
            <div className="absolute inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm print:hidden">
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-in zoom-in-95">
                <div className="flex justify-between items-center p-4 border-b dark:border-gray-700 bg-teal-50 dark:bg-teal-900/30">
                  <h3 className="font-bold text-teal-800 dark:text-teal-400 flex items-center gap-2"><CreditCard size={20} /> Dados do PIX</h3>
                  <button onClick={() => setIsPixModalOpen(false)} className="text-gray-500 hover:text-gray-700 dark:text-gray-400"><X size={20} /></button>
                </div>
                <div className="p-6 space-y-4">
                  <div className="text-center mb-6">
                    <p className="text-sm text-gray-500 dark:text-gray-400">Cobrar no PIX:</p>
                    <p className="text-3xl font-black text-teal-600 dark:text-teal-400">{formatCurrency(cartTotal)}</p>
                  </div>
                  <div>
                    <label className="block text-sm font-semibold mb-1">Nome do Aluno</label>
                    <input type="text" value={pixStudentName} onChange={e => setPixStudentName(e.target.value)} placeholder="Ex: João da Silva" className="w-full p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-600 rounded-xl outline-none" autoFocus />
                  </div>
                  <div>
                    <label className="block text-sm font-semibold mb-1">Série / Turma</label>
                    <input type="text" value={pixStudentClass} onChange={e => setPixStudentClass(e.target.value)} placeholder="Ex: 3º Ano B" className="w-full p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-600 rounded-xl outline-none" />
                  </div>
                </div>
                <div className="p-4 flex gap-3 bg-gray-50 dark:bg-gray-800/80">
                  <button onClick={() => setIsPixModalOpen(false)} className="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-bold hover:bg-gray-300">Cancelar</button>
                  <button onClick={() => processCheckout('PIX')} className="flex-1 py-3 bg-teal-500 text-white rounded-xl font-bold hover:bg-teal-600">Confirmar</button>
                </div>
              </div>
            </div>
          )}

          {/* ================= BARRA LATERAL ================= */}
          <aside className="w-20 md:w-64 border-r dark:border-gray-800 flex flex-col p-4 shadow-sm print:hidden transition-all duration-300 z-10 shrink-0 h-screen overflow-y-auto bg-white dark:bg-gray-900">
            <div className="flex flex-col items-center md:items-start md:flex-row gap-3 px-2 mb-8 mt-2 text-blue-600 dark:text-blue-500">
              <img src={settings.logoUrl} alt="Logo" className="w-10 h-10 rounded-full object-cover border-2 border-current shrink-0" />
              <div className="hidden md:block overflow-hidden">
                <h1 className="text-sm font-black uppercase text-gray-500 dark:text-gray-400 tracking-wider truncate">{settings.gremioName}</h1>
                <h2 className="text-lg font-bold tracking-tight truncate text-gray-800 dark:text-gray-100">{settings.eventName}</h2>
              </div>
            </div>

            <nav className="flex-1 space-y-2">
              <NavItem id="pos" icon={ShoppingCart} label="Caixa (PDV)" />
              <NavItem id="products" icon={Tag} label="Cardápio" />
              <NavItem id="history" icon={History} label="Histórico Atual" />
              <NavItem id="report" icon={LayoutDashboard} label="Relatório de Vendas" />
              <NavItem id="closing" icon={Lock} label="Fechamento (Gaveta)" />
            </nav>

            <div className="mt-auto space-y-2 pt-4 border-t border-gray-200 dark:border-gray-800">
              <button onClick={() => setIsCalcOpen(!isCalcOpen)} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <Calculator size={20}/> <span className="hidden md:block font-medium">Calculadora</span>
              </button>
              <NavItem id="settings" icon={Settings} label="Configurações" />
              <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                {theme === 'dark' ? <Sun size={20}/> : <Moon size={20}/>}
                <span className="hidden md:block font-medium capitalize">Modo {theme === 'dark' ? 'Claro' : 'Escuro'}</span>
              </button>
            </div>
          </aside>

          {/* ================= ÁREA DE CONTEÚDO PRINCIPAL ================= */}
          <main className="flex-1 flex flex-col h-screen overflow-hidden print:h-auto print:overflow-visible relative">
            <div className="flex-1 overflow-y-auto p-4 md:p-6 print:p-0">
              
              {/* === CAIXA (PDV) === */}
              {activeTab === 'pos' && (
                <div className="flex flex-col lg:flex-row gap-6 h-full print:hidden">
                  <div className="flex-1 flex flex-col">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-2xl font-bold">Frente de Caixa</h2>

                        <div className="space-y-4">
                          {eventLogs.map(log => (
                            <div key={log.id} className="bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl p-4 flex flex-col lg:flex-row justify-between gap-4">
                              <div>
                                <h3 className="font-bold text-lg text-gray-800 dark:text-gray-100">{log.eventName}</h3>
                                <p className="text-sm text-gray-500">{formatDate(log.date)}</p>
                              </div>
                              <div className="flex flex-wrap gap-4 text-sm">
                                <div className="bg-white dark:bg-gray-800 p-2 rounded-lg border dark:border-gray-700">
                                  <span className="block text-xs text-gray-500">Total Bruto</span>
                                  <strong className="text-gray-800 dark:text-gray-200">{formatCurrency(log.totalGross)}</strong>
                                </div>
                                <div className="bg-white dark:bg-gray-800 p-2 rounded-lg border dark:border-gray-700">
                                  <span className="block text-xs text-gray-500">PIX / Dinheiro Físico</span>
                                  <strong className="text-gray-800 dark:text-gray-200">{formatCurrency(log.totalPix)} / {formatCurrency(log.drawerPhysical)}</strong>
                                </div>
                                <div className={`bg-white dark:bg-gray-800 p-2 rounded-lg border dark:border-gray-700 ${log.difference < 0 ? 'text-red-500' : 'text-green-500'}`}>
                                  <span className="block text-xs text-gray-500">Diferença de Caixa</span>
                                  <strong>{log.difference === 0 ? 'Perfeito' : formatCurrency(log.difference)}</strong>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Zona de Perigo Real */}
                  <div className="bg-red-50 dark:bg-red-900/20 rounded-2xl border border-red-200 dark:border-red-800/50 p-6 flex items-center justify-between gap-4">
                    <div>
                      <h3 className="font-bold text-red-800 dark:text-red-400 mb-1 flex items-center gap-2"><AlertTriangle size={18}/> Exclusão Completa (Reset de Fábrica)</h3>
                      <p className="text-sm text-red-600 dark:text-red-300">Isto apagará tudo: Vendas atuais, Cardápio e Histórico de Logs.</p>
                    </div>
                    <button onClick={() => {
                        setConfirmDialog({
                          isOpen: true, title: 'Resetar Tudo', text: 'Você tem certeza absoluta? Essa ação é irreversível.', isDanger: true,
                          action: () => {
                            setSales([]); setEventLogs([]); setProducts([]);
                            setCashDrawer({200:0,100:0,50:0,20:0,10:0,5:0,2:0,1:0,0.5:0,0.25:0,0.1:0,0.05:0}); 
                            setSettings(defaultSettings);
                            setActiveTab('pos');
                          }
                        });
                    }} className="shrink-0 bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-xl transition-colors">
                      Zerar o Sistema
                    </button>
                  </div>
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
